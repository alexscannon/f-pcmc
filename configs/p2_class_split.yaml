# P2 (O-UCL phased stream) T0/held-out class split — PRD §7.1.
#
# DECISION (recorded, not left to the agent's seed): the 15 CIFAR-100 subclasses
# under aquatic_mammals, fish, and small_mammals are EXCLUDED from the held-out
# draw and always remain in T0.
#
# WHY: the fixed near-OOD synthetic pool (novel_subclasses.pt, 6 classes, 500
# images) is anchored entirely to these 3 superclasses (README: "3 existing
# superclasses (aquatic_mammals, fish, small_mammals)"). "Near-OOD" is only a
# meaningful semantic-distance condition at T0 if the model's *initial* (T0)
# vocabulary actually contains sibling subclasses of those superclasses — the PRD's
# near-OOD framing is about distance from the model's original vocabulary, not
# from whatever it has incrementally relearned by the time the near-OOD phase
# runs later in the P2 schedule. A blind 80/20 draw over all 100 subclasses can
# (and with 3/20 superclass-probability, often will) pull most or all of a
# superclass's 5 subclasses into the held-out 20, gutting T0's anchor for that
# superclass and quietly changing what "near-OOD" is measuring run to run.
#
# ALTERNATIVE CONSIDERED: stratify to leave >=3 of 5 subclasses per superclass
# in T0 (i.e. cap held-out draws at <=2 per superclass) instead of full exclusion.
# Rejected: full exclusion is simpler, removes the confound entirely rather than
# bounding it, and costs only 15 of 100 candidate slots in the held-out draw pool
# (which still has 85 eligible subclasses for 20 slots — no scarcity issue).
#
# ALGORITHM (deterministic, reproducible without depending on numpy's RNG
# internals across versions -- the frozen `held_out` list below is the source of
# truth; the algorithm is documented for audit only):
#   1. protected_subclasses = union of cifar100_super_subclass_mapping.json[sc]
#      for sc in {aquatic_mammals, fish, small_mammals}   (15 subclasses)
#   2. eligible = sorted(all_100_subclasses - protected_subclasses)   (85 subclasses)
#   3. rng = numpy.random.RandomState(42)  (project convention: seed 42 throughout)
#   4. idx = rng.choice(len(eligible), size=20, replace=False)
#   5. held_out = sorted(eligible[i] for i in idx)
#   6. t0 = sorted(all_100_subclasses - held_out)   # == protected_subclasses (15) + 65 more
#
# Computed 2026-07-10 against msproject_misc/cifar100_super_subclass_mapping.json
# (git blob c9a1e... n/a — file is untracked config data at repo root, not in git;
# content reproduced verbatim in protected_superclass_subclasses below for audit).

