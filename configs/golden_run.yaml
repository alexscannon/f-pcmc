# Golden-run config — the frozen configuration for the T11 golden gate
# (test_golden_stream_end_to_end) on the frozen 2,000-step golden stream
# (tests/fixtures/golden_stream.npz, 8 windows x window_W=250).
#
# PROVENANCE (2026-07-11): proposed by the coding agent under the owner's
# in-session instruction to proceed on recommendations; ratified and amended
# by the owner (stm_capacity 16 -> 25) on 2026-07-11. Values were chosen from
# first principles BEFORE the gate first ran, and neither the original values
# nor the amendment were tuned against gate results (the T8-acceptance
# ruling's binding constraint).
#
# **THIS CONFIG IS NOW FROZEN.** It is owner-pinned gate input, on the same
# footing as tests/fixtures/golden_stream.npz: any further red on
# test_golden_stream_end_to_end is a mechanism defect to be fixed in fpcmc/,
# never a reason to touch a value here. Changing it requires owner approval.
#
# AMENDED 2026-07-13 (owner-directed, forced by a spec change, NOT tuning):
# `min_cohesion: 0.55` -> `min_cohesion_ratio: 0.35`. PRD FR-7 criterion 2 became
# RELATIVE (cohesion >= ratio x median cohesion of the T0 LTM concepts) because an
# absolute bar is unusable on real embeddings, and the old key is retired — this
# file could not load without the rename. The new value is the PRD §8 default,
# transcribed verbatim, exactly as the old one was; it was not chosen against gate
# results. The gate was re-run after the change and is green.
#
# Deviations from PRD §8 defaults, with rationale:
#   stm_capacity: 25  — bounded on both sides, and both bounds bind:
#       LOWER — capacity must EXCEED the peak same-class fragment load, or
#       consolidation cannot pay off. The prior-seeded singleton thresholds
#       fragment each novel class into several concurrent candidates (T8/T9
#       findings); T10's residual clustering coalesces them, but a coalesced
#       candidate then has to SURVIVE the gap windows between its class's
#       appearances (novel classes recur in >= 4 of 8 windows, so gaps are
#       real) to reach theta_promote. At 16 the peak fragment load plus the
#       LTM-adjacent churn evicts the coalesced candidate inside those gaps
#       and the march to theta restarts; 25 leaves it resident.
#       UPPER — capacity must stay BELOW the demand the 25 planted
#       distractors plus normal seed churn place on STM, or nothing is ever
#       evicted and the burst-eviction assertion tests nothing. This is the
#       "<= ~25" the golden-stream freeze records (CLAUDE.md; CHANGES T1):
#       25 one-off distractors alone saturate a 25-slot STM against any
#       live candidate, so LRU pressure on the burst class is structural,
#       not emergent. 25 is the largest value that keeps both bounds.
#   T_merge / T_cluster / w_residual: 250 — hook cadences scaled to the
#       2,000-step stream (the §8 defaults of 500 were sized for the ~13k
#       P1 stream): one merge sweep and one residual-clustering opportunity
#       per stream window, and singletons age into the residual pool after
#       one full window without maturing — so consolidation can act between
#       a novel class's appearances (they recur across >= 4 of 8 windows).
# Everything else is the PRD §8 default; window_W=250 matches the frozen
# stream's window size, and seed=42 is the primary evaluation seed.
encoder: dinov3_vitl16
scorer: knn_vmf
k_ref: 5
n_vmf_min: 10
tau_percentile_q: 95
n_shrink: 10
alpha_stm_ema: 0.1
K_max_refset: 64
stm_capacity: 25
n_mature: 5
theta_promote: 30
min_cohesion_ratio: 0.35
sep_factor: 1.0
m_windows: 3
window_W: 250
T_cluster: 250
w_residual: 250
T_merge: 250
merge_sim: 0.8
umap:
  dim: 50
  n_neighbors: 15
  min_dist: 0.0
  metric: cosine
hdbscan:
  min_cluster_sizes:
  - 10
  - 15
  - 20
  - 25
  - 30
  selection: eom
seed: 42
