# F-PCMC default configuration — PRD §8 defaults, transcribed verbatim.
# Schema: fpcmc/config.py::FPCMCConfig (unknown keys are errors).
encoder: dinov3_vitl16          # or resnet50 (A6)
scorer: knn_vmf                 # knn_ref | vmf | knn_vmf
k_ref: 5
n_vmf_min: 10
tau_percentile_q: 95
n_shrink: 10
alpha_stm_ema: 0.10
K_max_refset: 64
stm_capacity: 100               # sweep {50, 100, 200}
n_mature: 5
theta_promote: 30               # sweep {20, 30, 50}
min_cohesion: 0.55              # sweep {0.45, 0.55, 0.65}
sep_factor: 1.0
m_windows: 3
window_W: 250
T_cluster: 500
w_residual: 500
T_merge: 500
merge_sim: 0.80
umap: {dim: 50, n_neighbors: 15, min_dist: 0.0, metric: cosine}
hdbscan: {min_cluster_sizes: [10, 15, 20, 25, 30], selection: eom}
seed: 42
