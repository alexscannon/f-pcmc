# Pinned known-good metrics for T6 (M1 sanity gate) and T14 (v1 regression pin).
#
# PROVENANCE (t14_v1_regression_pin and source_streaming_knn_vmf_run): these are
# NOT the rounded numbers from writeups/consolidated.md or
# writeups/05_experimental_results.md. They are read directly from a FRESH
# reproduction run executed 2026-07-10 in-session, before any porting began:
#
#   cd msproject_misc/evaluation/continual && .venv/bin/python main.py \
#     --paradigm {mahalanobis_hdbscan,knn_vmf} \
#     --output-dir <fresh-dir> --force
#   (config.yaml defaults used for everything else: random_seed=42, ind_warmup_count=1000,
#    oracle_mode=none, stream_order=random, full stream — no --limit)
#
# Those fresh runs' numbers are BYTE-IDENTICAL to the pre-existing
# outputs/continual/{mahalanobis_hdbscan,knn_vmf}_seed42_full/results_summary.json
# generated earlier — confirming the pipeline is deterministic and these values are
# a stable target, not an artifact of one run.
#
# PROVENANCE (t6_m1_gate): re-pinned 2026-07-11 (owner-directed) from a fresh
# STATIC BATCH run in the source project — see that entry's header. The original
# 2026-07-10 pin mistakenly used the streaming knn_vmf run's whole-stream AUROC,
# which is NOT the batch detector's AUROC (the streaming detector's gallery grows
# with promotions mid-stream, coupling detection to discovery). The streaming
# numbers are preserved under source_streaming_knn_vmf_run below.
#
# Source repo: msproject_misc, HEAD e723f028d84846b4a244fb3a30c9456f817b16c6 (2026-07-05).
# evaluation/continual/{config.py,config.yaml,evaluation.py,main.py,stream.py} had
# UNCOMMITTED local edits at run time (an opt-in stream_order ablation feature;
# default stream_order=random preserves prior behavior — confirmed by diff and by
# the byte-identical match above). git_blob_hash fields below are `git hash-object`
# content hashes (valid for uncommitted content), not commit hashes, for exactly
# this reason. All nine pinned blob hashes were re-verified byte-identical on
# 2026-07-11 before the t6 re-pin run. See docs/ASSETS.md §2/§6 for the full
# module inventory.
#
# KNOWN DISCREPANCY (flag for human review before use): writeups/05_experimental_results.md:82
# and writeups/consolidated.md:371 state "Overall accuracy | 72.4%" for
# mahalanobis_hdbscan. Every computed artifact (this fresh run, the pre-existing
# results_summary.json, evaluation/continual/outputs/phase_B_report.md,
# evaluation/continual/outputs/phase_C_report.md, evaluation/continual/CHANGES.md:172)
# agrees on 0.740 (74.03%), not 72.4%. The paper draft's "72.4%" appears to be a
# transcription error, not a different (older) pipeline result. TASKS.md:312's stated
# tolerance "overall accuracy 72.4% ± 0.5" is therefore WRONG and will make
# test_v1_regression_pin fail against a correctly-ported v1 — this file pins the
# verified value (0.7403) instead. Recommend TASKS.md:312 be corrected; not edited
# here since docs/ and this file's *content* are the coding agent's immutable specs,
# but the discrepancy must be resolved by a human before T14 is attempted.

t6_m1_gate:
  description: >
    Batch knn_vmf detection AUROC: STATIC batch, 50k-train gallery, growth
    disabled, 20th-NN statistic. IND test (10,000 CIFAR-100 test + 250
    synthetic IND = 10,250) vs near/far/all OOD, scored read-only against the
    frozen warmup gallery — no streaming, no promotion, no gallery growth.
    T6's LTM-only routing must reproduce this within ±0.01 overall, ±0.015
    stratified. NOTE: T6's instrument (min over 100 per-class concepts, each a
    64-member reservoir ref_set, mean-5-NN cosine distance) is a DELIBERATELY
    DIFFERENT statistic from the source's single 20th-NN over the full 50k
    gallery; the two are expected to agree within the gate tolerance. Observed
    at pin time (2026-07-11): T6 instrument vs this pin Δ = 0.0030/0.0024/0.0031
    (all/near/far — gate green with headroom); the fresh source-side batch run
    agrees with the T6 session's static replication of the same 20th-NN
    statistic to ≤ 1e-4. A future red gate should therefore be triaged as
    implementation drift vs instrument mismatch, not as a wrong pin.
  source:
    kind: static_batch  # NOT the streaming run — see source_streaming_knn_vmf_run
    date: 2026-07-11
    repo: msproject_misc
    git_commit: e723f028d84846b4a244fb3a30c9456f817b16c6
    command: "cd evaluation/continual && uv run python scripts/batch_knn_vmf_static.py"
    script: evaluation/continual/scripts/batch_knn_vmf_static.py  # untracked at run time
    script_git_blob_hash: f17c41945099788b169115bf87ef295283cfb404
    archived_output_dir: /home/alex/data/evaluation/dinov3_l/2/batch_knn_vmf_static
    archived_files: [results.json, scores.npz, config_snapshot.yaml]
    gallery: 50,000 CIFAR-100 train embeddings (real_cifar100.pt, sources == cifar100_train),
      L2-normalized float64 — identical to the streaming run's warmup gallery
    statistic: kth-neighbor cosine distance, k=20 (config knn.k, knn.distance=kth),
      per-query matvec — the paradigm's own detection lines, growth disabled
    config: config.yaml defaults (blob 33154bf437d5278f68d8423b697a33c9d19117e1);
      threshold_percentile=95, random_seed=42 (no randomness on this path)
    gallery_identity_check: calibrated tau == 0.6165391407194315, bit-identical to
      the streaming run's pinned threshold_tau — same gallery, same statistic
    git_blob_hashes:  # detection code path, all == the 2026-07-10 pins
      evaluation/continual/paradigms/knn_vmf.py: 7ef929c11003404df4557ce8af108c339255d044
      evaluation/continual/paradigms/knn_dpmeans.py: 5e9da6f94c5d7bfc1a4986f65d62bb610ba2190b
      evaluation/continual/data_loader.py: 0860808ea1e84208c141fb5d1ec3d81811fb63c1
      evaluation/continual/evaluation.py: 2d0d7e5e279483d5d8cd6892b89169c3339a8031  # uncommitted edit
      evaluation/continual/config.py: b0f9acb9f96ab97b39105bbab291e4a78c32ca6c    # uncommitted edit
      evaluation/continual/config.yaml: 33154bf437d5278f68d8423b697a33c9d19117e1  # uncommitted edit
    n_ind: 10250   # 10,000 cifar100_test + 250 synthetic IND (ind.pt)
    n_near_ood: 500    # novel_subclasses.pt, 6 classes
    n_far_ood: 2576    # novel_superclasses.pt, 43 classes
  metrics:
    auroc_all_ood: 0.9410686669415459
    auroc_near_ood: 0.7711480975609756
    auroc_far_ood: 0.9740501439175883
  tolerance:
    all_ood: 0.01
    near_ood: 0.015
    far_ood: 0.015

# NOT A GATE REFERENCE. Whole-stream AUROC of a growth-coupled detector,
# preserved for provenance: this was the original (mis-sourced) t6_m1_gate pin,
# 2026-07-10. In the streaming knn_vmf run, promoted clusters grow the kNN
# gallery mid-stream, so detection is coupled to discovery — the whole-stream
# AUROC (0.8592) measures the ADAPTIVE detector, not the static batch detector
# (0.9411 above). That adaptive-detector effect is exactly what the F-PCMC
# paper is about, which is why this record is kept rather than deleted.
